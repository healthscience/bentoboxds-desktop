name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
      GPT4ALL_SKIP_INSTALL_BACKEND: "true"
      npm_config_build_from_source: "false"

    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.21.1'
          cache: 'npm'

      - name: Cache hop node_modules
        uses: actions/cache@v4
        with:
          path: hop/node_modules
          key: ${{ runner.os }}-hop-${{ hashFiles('hop/package-lock.json', 'hop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-hop-

      - name: Install dependencies
        run: |
          npm install
          cd hop && npm install

      - name: Install renderer dependencies
        working-directory: ./src/renderer
        run: npm install

      - name: Build for Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 libsqlite3-dev
          npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_arch: x64
          npm_config_target_arch: x64

      - name: Build for macOS
        if: matrix.os == 'macos-latest'
        run: |
          npm run build:mac
          ls -R dist/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_arch: x64
          npm_config_target_arch: x64

      - name: Validate pkg file
        if: matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/')
        run: |
          PKG_FILE="dist/BentoBox-DS-Desktop-${{ steps.version.outputs.VERSION }}.pkg"
          if [ ! -f "$PKG_FILE" ]; then
            echo "Error: $PKG_FILE not found"
            exit 1
          fi
          if [ ! -s "$PKG_FILE" ]; then
            echo "Error: $PKG_FILE is empty"
            exit 1
          fi
          file "$PKG_FILE"
          ls -lh "$PKG_FILE"

      - name: Upload to TestFlight
        if: matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/')
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.MACDEVID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_API_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_$APPSTORE_API_KEY_ID.p8
          xcrun altool --upload-app \
            -f "dist/BentoBox-DS-Desktop-${{ steps.version.outputs.VERSION }}.pkg" \
            -t osx \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID"



      - name: Build for Windows
        if: matrix.os == 'windows-latest'
        run: |
          npm install --os=win32 --cpu=x64
          npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_arch: x64
          npm_config_target_arch: x64
          npm_config_build_from_source: true
          # npm_config_nodedir: ""

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.AppImage
            dist/*.dmg
            dist/*.pkg
            dist/*.exe
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
